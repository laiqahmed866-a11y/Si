<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 22nd Birthday 🌹</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel+Decorative:wght@400;700&family=Lato:wght@300;400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0005;overflow:hidden;width:100vw;height:100vh;font-family:'Lato',sans-serif;}

/* ===== GIFT BOX INTRO ===== */
#gift-screen{
  position:fixed;inset:0;z-index:300;
  background:radial-gradient(ellipse at 50% 40%, #3a0020 0%, #180010 50%, #0a0005 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;cursor:pointer;
  transition:opacity 1.2s ease;
}
#gift-screen h2{
  font-family:'Lato',sans-serif;font-weight:300;
  letter-spacing:0.5em;font-size:clamp(11px,2vw,14px);
  color:rgba(255,182,193,0.7);text-transform:uppercase;
  animation:pulseText 2s ease-in-out infinite;
}
#gift-screen .tagline{
  font-family:'Great Vibes',cursive;
  font-size:clamp(28px,6vw,52px);
  color:#ffd4a0;
  text-shadow:0 0 30px rgba(255,212,160,0.5);
  animation:pulseText 2s 0.3s ease-in-out infinite;
}
#gift-screen .hint{
  font-family:'Lato',sans-serif;font-weight:300;
  letter-spacing:0.25em;font-size:clamp(10px,1.8vw,12px);
  color:rgba(255,182,193,0.45);text-transform:uppercase;
  margin-top:10px;
  animation:pulseText 2s 0.6s ease-in-out infinite;
}

/* Gift Box SVG Container */
#gift-wrap{
  position:relative;width:180px;height:180px;
  animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 10px 30px rgba(255,100,150,0.5));
}
#gift-wrap:hover{filter:drop-shadow(0 15px 40px rgba(255,100,150,0.9));}

/* Sparkles around gift */
.sparkle{
  position:absolute;font-size:20px;
  animation:sparklePop 1.8s ease-in-out infinite;
}
.sparkle:nth-child(1){top:-20px;left:20px;animation-delay:0s;}
.sparkle:nth-child(2){top:-10px;right:10px;animation-delay:0.4s;}
.sparkle:nth-child(3){bottom:10px;left:-15px;animation-delay:0.8s;}
.sparkle:nth-child(4){bottom:-10px;right:20px;animation-delay:1.2s;}
.sparkle:nth-child(5){top:50%;right:-20px;animation-delay:0.2s;}

/* ===== PARTICLES ===== */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ===== SLIDESHOW ===== */
#slideshow{position:relative;width:100%;height:100vh;z-index:1;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1.4s ease-in-out;}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;filter:brightness(0.72);}
.slide::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,0,5,0.4) 0%,transparent 35%,transparent 55%,rgba(10,0,5,0.8) 100%);
}

/* ===== SHIMMER ===== */
#shimmer{position:fixed;top:0;left:-100%;width:60%;height:100vh;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);
  z-index:8;pointer-events:none;animation:shimmer 5s 2s linear infinite;}

/* ===== HUD ===== */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;padding:38px 30px 52px;}

#top-title{text-align:center;opacity:0;transform:translateY(-30px);animation:fadeDown 1.5s 0.3s ease forwards;}
#top-title .sub{font-family:'Lato',sans-serif;font-weight:300;letter-spacing:0.4em;
  font-size:clamp(9px,1.8vw,13px);color:#f5c6d0;text-transform:uppercase;margin-bottom:6px;}
#top-title h1{font-family:'Great Vibes',cursive;font-size:clamp(50px,10vw,100px);color:#fff;
  text-shadow:0 0 30px rgba(255,182,193,0.8),0 0 60px rgba(255,100,150,0.4);line-height:1;}
#top-title .age{font-family:'Cinzel Decorative',serif;font-size:clamp(10px,2vw,16px);
  color:#ffd4a0;letter-spacing:0.3em;margin-top:5px;}

#bottom-area{width:100%;text-align:center;}
#caption{font-family:'Great Vibes',cursive;font-size:clamp(22px,5vw,40px);
  color:rgba(255,255,255,0.9);text-shadow:0 0 20px rgba(255,150,180,0.6);
  margin-bottom:16px;min-height:46px;}
#dots{display:flex;justify-content:center;gap:10px;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.25);transition:all 0.4s;}
.dot.active{background:#ffb6c1;transform:scale(1.5);box-shadow:0 0 8px rgba(255,182,193,0.8);}

/* ===== MUSIC BTN ===== */
#music-btn{
  position:fixed;top:18px;right:18px;z-index:50;
  background:rgba(255,182,193,0.12);border:1px solid rgba(255,182,193,0.4);
  border-radius:50%;width:44px;height:44px;
  cursor:pointer;font-size:20px;display:none;
  align-items:center;justify-content:center;
  pointer-events:all;transition:all 0.3s;backdrop-filter:blur(10px);
}
#music-btn:hover{background:rgba(255,182,193,0.28);transform:scale(1.1);}

/* ===== CORNERS ===== */
.corner{position:fixed;z-index:9;pointer-events:none;opacity:0.4;}
.corner svg{width:100px;height:100px;}
.corner.tl{top:0;left:0}.corner.tr{top:0;right:0;transform:scaleX(-1)}
.corner.bl{bottom:0;left:0;transform:scaleY(-1)}.corner.br{bottom:0;right:0;transform:scale(-1,-1)}

/* ===== PROGRESS ===== */
#progress{position:fixed;bottom:0;left:0;height:3px;
  background:linear-gradient(90deg,#ff9eb5,#ffd4a0,#ff9eb5);
  z-index:20;box-shadow:0 0 10px rgba(255,182,193,0.8);}

/* ===== HEARTS ===== */
.heart{position:fixed;z-index:5;pointer-events:none;animation:floatUp 4s ease-in forwards;opacity:0;}

/* ===== CONFETTI ===== */
.cp{position:fixed;z-index:6;pointer-events:none;animation:confettiFall linear forwards;}

/* ===== KEYFRAMES ===== */
@keyframes pulseText{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes sparklePop{0%,100%{opacity:0.3;transform:scale(0.7)}50%{opacity:1;transform:scale(1.2)}}
@keyframes fadeDown{to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{left:-60%}100%{left:160%}}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(0.5)}20%{opacity:0.9;transform:translateY(-20px) scale(1)}80%{opacity:0.5}100%{opacity:0;transform:translateY(-200px) scale(0.8) rotate(20deg)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes giftOpen{0%{transform:scale(1)}30%{transform:scale(1.15) rotate(-3deg)}60%{transform:scale(0.9) rotate(3deg)}100%{transform:scale(0);opacity:0}}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div id="shimmer"></div>

<!-- CORNERS -->
<div class="corner tl"><svg viewBox="0 0 100 100" fill="none"><path d="M0 0 Q50 0 50 50 Q50 0 100 0" stroke="#ffb6c1" stroke-width="1.2" fill="none"/><path d="M0 0 Q0 50 50 50" stroke="#ffd4a0" stroke-width="1" fill="none" opacity="0.6"/><circle cx="8" cy="8" r="3" fill="#ffb6c1"/><circle cx="24" cy="4" r="1.5" fill="#ffd4a0"/><circle cx="4" cy="24" r="1.5" fill="#ffd4a0"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 100 100" fill="none"><path d="M0 0 Q50 0 50 50 Q50 0 100 0" stroke="#ffb6c1" stroke-width="1.2" fill="none"/><path d="M0 0 Q0 50 50 50" stroke="#ffd4a0" stroke-width="1" fill="none" opacity="0.6"/><circle cx="8" cy="8" r="3" fill="#ffb6c1"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 100 100" fill="none"><path d="M0 0 Q50 0 50 50 Q50 0 100 0" stroke="#ffb6c1" stroke-width="1.2" fill="none"/><path d="M0 0 Q0 50 50 50" stroke="#ffd4a0" stroke-width="1" fill="none" opacity="0.6"/><circle cx="8" cy="8" r="3" fill="#ffb6c1"/></svg></div>
<div class="corner br"><svg viewBox="0 0 100 100" fill="none"><path d="M0 0 Q50 0 50 50 Q50 0 100 0" stroke="#ffb6c1" stroke-width="1.2" fill="none"/><path d="M0 0 Q0 50 50 50" stroke="#ffd4a0" stroke-width="1" fill="none" opacity="0.6"/><circle cx="8" cy="8" r="3" fill="#ffb6c1"/></svg></div>

<!-- ===== GIFT BOX INTRO SCREEN ===== -->
<div id="gift-screen" onclick="openGift()">
  <h2>✦ A Special Surprise ✦</h2>
  <div id="gift-wrap">
    <span class="sparkle">✨</span>
    <span class="sparkle">🌟</span>
    <span class="sparkle">💫</span>
    <span class="sparkle">⭐</span>
    <span class="sparkle">✨</span>
    <!-- Gift Box SVG -->
    <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" width="180" height="180">
      <!-- Box body -->
      <rect x="20" y="90" width="140" height="80" rx="6" fill="#c0344a" stroke="#ff7eb3" stroke-width="2"/>
      <!-- Box lid -->
      <rect x="14" y="70" width="152" height="28" rx="6" fill="#d94060" stroke="#ff9eb5" stroke-width="2"/>
      <!-- Ribbon vertical -->
      <rect x="82" y="70" width="16" height="100" fill="#ffd4a0" opacity="0.9"/>
      <!-- Ribbon horizontal on lid -->
      <rect x="14" y="78" width="152" height="12" fill="#ffd4a0" opacity="0.9"/>
      <!-- Bow left loop -->
      <ellipse cx="82" cy="68" rx="28" ry="16" fill="#ffb6c1" transform="rotate(-30 82 68)" opacity="0.95"/>
      <!-- Bow right loop -->
      <ellipse cx="98" cy="68" rx="28" ry="16" fill="#ff9eb5" transform="rotate(30 98 68)" opacity="0.95"/>
      <!-- Bow center knot -->
      <circle cx="90" cy="70" r="11" fill="#ffd4a0"/>
      <circle cx="90" cy="70" r="7" fill="#ffb6c1"/>
      <circle cx="90" cy="70" r="3" fill="#fff" opacity="0.6"/>
      <!-- Shine on box -->
      <rect x="28" y="97" width="6" height="60" rx="3" fill="rgba(255,255,255,0.12)"/>
      <!-- Stars on box -->
      <text x="50" y="140" font-size="18" fill="rgba(255,212,160,0.6)">★</text>
      <text x="108" y="128" font-size="12" fill="rgba(255,212,160,0.5)">✦</text>
      <text x="36" y="118" font-size="10" fill="rgba(255,212,160,0.4)">✦</text>
    </svg>
  </div>
  <div class="tagline">Click to Open 🎁</div>
  <div class="hint">tap the gift box</div>
</div>

<!-- MUSIC BTN -->
<div id="music-btn" onclick="toggleMusic()">🎵</div>

<!-- SLIDESHOW -->
<div id="slideshow"></div>

<!-- HUD -->
<div id="hud">
  <div id="top-title">
    <div class="sub">✦ A Special Celebration ✦</div>
    <h1>Happy Birthday</h1>
    <div class="age">22 Years of Joy & Grace 🌹</div>
  </div>
  <div id="bottom-area">
    <div id="caption"></div>
    <div id="dots"></div>
  </div>
</div>
<div id="progress" style="width:0%"></div>

<script>
// ── IMAGES: Add your image filenames here ──
// Put all images in an "images" folder next to index.html
const imageFiles = [
  'images/Gemini_Generated_Image_4hyt5g4hyt5g4hyt.png',
  'images/Gemini_Generated_Image_5u91jd5u91jd5u91.png',
  'images/Gemini_Generated_Image_8fqm2n8fqm2n8fqm.png',
  'images/Gemini_Generated_Image_41dbil41dbil41db.png',
  'images/Gemini_Generated_Image_ar0ugear0ugear0u.png',
  'images/Gemini_Generated_Image_csv3d8csv3d8csv3.png',
  'images/Gemini_Generated_Image_lmln3ylmln3ylmln.png',
  'images/Gemini_Generated_Image_m926kkm926kkm926.png',
  'images/Gemini_Generated_Image_rqd8p9rqd8p9rqd8.png',
  'images/Gemini_Generated_Image_xzrchpxzrchpxzrc.png'
];

const captions = [
  "Happy 22nd Birthday! 🌹",
  "Surrounded by love & laughter 💕",
  "Beautiful moments, beautiful memories 🎂",
  "Every smile is a blessing ✨",
  "22 years of grace & joy 🌸",
  "Celebrating you, always 💖",
  "May all your wishes come true 🎉",
  "Time flies when you're having fun ⏰",
  "Here's to a wonderful year ahead 🥂",
  "Forever cherishing this day 🌹"
];

let current = 0, slideInterval = null, progressInterval = null, progressVal = 0;
const DURATION = 4500;
let musicPlaying = false, audioCtx = null;

// ── GIFT OPEN ──
function openGift() {
  const gs = document.getElementById('gift-screen');
  const gw = document.getElementById('gift-wrap');
  gw.style.animation = 'giftOpen 0.8s ease forwards';
  spawnConfetti();
  setTimeout(() => {
    gs.style.opacity = '0';
    setTimeout(() => { gs.style.display='none'; startShow(); }, 800);
  }, 600);
}

// ── BUILD SLIDES ──
function buildSlides() {
  const ss = document.getElementById('slideshow');
  const dotsEl = document.getElementById('dots');
  ss.innerHTML=''; dotsEl.innerHTML='';
  imageFiles.forEach((src,i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    const img = document.createElement('img');
    img.src = src; img.alt = `Photo ${i+1}`;
    // fallback: if image missing, show gradient
    img.onerror = function(){ this.style.display='none'; slide.style.background='linear-gradient(135deg,#2a0015,#0a0005)'; }
    slide.appendChild(img);
    ss.appendChild(slide);
    const dot = document.createElement('div');
    dot.className='dot';
    dotsEl.appendChild(dot);
  });
}

function goTo(n) {
  const slides = document.querySelectorAll('.slide');
  const dotEls = document.querySelectorAll('.dot');
  if(!slides.length) return;
  slides[current].classList.remove('active');
  dotEls[current].classList.remove('active');
  current = (n + slides.length) % slides.length;
  slides[current].classList.add('active');
  dotEls[current].classList.add('active');
  document.getElementById('caption').textContent = captions[current % captions.length];
  progressVal = 0;
  spawnHearts();
}

function startShow() {
  buildSlides();
  document.getElementById('music-btn').style.display = 'flex';
  goTo(0);
  slideInterval = setInterval(() => goTo(current+1), DURATION);
  progressInterval = setInterval(() => {
    progressVal += 100/(DURATION/100);
    document.getElementById('progress').style.width = Math.min(progressVal,100)+'%';
  }, 100);
  startMusic();
  spawnConfetti();
}

// ── MUSIC ──
function startMusic() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    playHappyBirthday();
    musicPlaying = true;
  } catch(e) {}
}

function toggleMusic() {
  if(!audioCtx) return;
  if(musicPlaying){ audioCtx.suspend(); musicPlaying=false; document.getElementById('music-btn').textContent='🔇'; }
  else { audioCtx.resume(); musicPlaying=true; document.getElementById('music-btn').textContent='🎵'; }
}

function playNote(freq,start,dur,vol=0.22){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=freq; o.type='sine';
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+0.05);
  g.gain.linearRampToValueAtTime(vol*0.7,start+dur-0.06);
  g.gain.linearRampToValueAtTime(0,start+dur);
  o.start(start); o.stop(start+dur);
}
function playChime(freq,start,dur){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=freq*2; o.type='triangle';
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(0.07,start+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  o.start(start); o.stop(start+dur);
}

function playHappyBirthday(){
  const now=audioCtx.currentTime+0.3;
  const notes=[
    [261.63,0.3],[261.63,0.15],[293.66,0.45],[261.63,0.45],[349.23,0.45],[329.63,0.9],
    [261.63,0.3],[261.63,0.15],[293.66,0.45],[261.63,0.45],[392.00,0.45],[349.23,0.9],
    [261.63,0.3],[261.63,0.15],[523.25,0.45],[440.00,0.45],[349.23,0.45],[329.63,0.45],[293.66,0.9],
    [466.16,0.3],[466.16,0.15],[440.00,0.45],[349.23,0.45],[392.00,0.45],[349.23,1.2]
  ];
  let t=now;
  notes.forEach(([f,d])=>{ playNote(f,t,d*0.95); playChime(f,t,d*0.9); t+=d; });
  const total=notes.reduce((s,[,d])=>s+d,0);
  setTimeout(()=>{ if(musicPlaying&&audioCtx&&audioCtx.state==='running') playHappyBirthday(); },(total+1.5)*1000);
}

// ── PARTICLES ──
const canvas=document.getElementById('particles'), ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
const pts=Array.from({length:80},()=>({
  x:Math.random()*canvas.width, y:Math.random()*canvas.height,
  r:Math.random()*2+0.5, dx:(Math.random()-0.5)*0.3,
  dy:-Math.random()*0.4-0.15,
  alpha:Math.random()*0.5+0.1,
  color:Math.random()>0.5?'#ffb6c1':'#ffd4a0'
}));
(function animP(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pts.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
    p.x+=p.dx;p.y+=p.dy;
    if(p.y<-5){p.y=canvas.height+5;p.x=Math.random()*canvas.width;}
    if(p.x<-5)p.x=canvas.width+5;
    if(p.x>canvas.width+5)p.x=-5;
  });
  requestAnimationFrame(animP);
})();

// ── HEARTS ──
function spawnHearts(){
  const em=['🌹','💖','✨','🎀','💕','🌸','🎂','🎊'];
  for(let i=0;i<6;i++) setTimeout(()=>{
    const h=document.createElement('div');
    h.className='heart';
    h.textContent=em[Math.floor(Math.random()*em.length)];
    h.style.left=(5+Math.random()*90)+'vw';
    h.style.bottom=(5+Math.random()*30)+'vh';
    h.style.fontSize=(14+Math.random()*18)+'px';
    h.style.animationDuration=(3+Math.random()*2)+'s';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5500);
  },i*250);
}

// ── CONFETTI ──
function spawnConfetti(){
  const colors=['#ffb6c1','#ffd4a0','#ff7eb3','#fff','#ffe4e1','#ffc0cb'];
  for(let i=0;i<50;i++) setTimeout(()=>{
    const c=document.createElement('div');
    c.className='cp';
    c.style.left=Math.random()*100+'vw';
    c.style.top='-10px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.borderRadius=Math.random()>0.5?'50%':'2px';
    c.style.width=(5+Math.random()*8)+'px';
    c.style.height=(5+Math.random()*8)+'px';
    c.style.animationDuration=(2+Math.random()*3)+'s';
    c.style.animationDelay=Math.random()*0.5+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5500);
  },i*60);
}

// ── KEYBOARD & TOUCH ──
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){clearInterval(slideInterval);goTo(current+1);}
  if(e.key==='ArrowLeft'){clearInterval(slideInterval);goTo(current-1);}
});
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX);
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){clearInterval(slideInterval);goTo(dx<0?current+1:current-1);}
});
</script>
</body>
</html>
